<svg width="500" height="700" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg">
    <!-- Style definition for consistent rendering -->
    <style>
        .cell { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
        .text { font-family: 'Noto Sans Devanagari', 'Sanskrit Text', serif; font-size: 32px; text-anchor: middle; dominant-baseline: middle; fill: #000000; }
        .bottom-text { font-family: 'Noto Sans Devanagari', 'Sanskrit Text', serif; font-size: 36px; text-anchor: middle; fill: #000000; font-weight: normal; }
    </style>

    <!-- Container group to center the diagram -->
    <g transform="translate(75, 40)">

        <!-- Row 1: 1 block -->
        <rect x="150" y="0" width="50" height="50" class="cell" />
        <text x="175" y="28" class="text">ह</text>

        <!-- Row 2: 3 blocks -->
        <rect x="100" y="50" width="50" height="50" class="cell" />
        <text x="125" y="78" class="text">अ</text>
